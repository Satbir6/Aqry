name: Test and build

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.23.x"
          cache: true
      - run: go test ./...
      - run: go vet ./...
      - run: sh -n scripts/install.sh
      - run: sh -n scripts/build-artifacts.sh
      - name: Test bundled-binary installer
        env:
          AQRY_ARTIFACT_DIR: ${{ github.workspace }}/dist
          AQRY_INSTALL_DIR: ${{ runner.temp }}/aqry-bin
          NO_COLOR: "1"
        run: sh scripts/install.sh

  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            output: aqry-linux-amd64
          - goos: linux
            goarch: arm64
            output: aqry-linux-arm64
          - goos: darwin
            goarch: amd64
            output: aqry-darwin-amd64
          - goos: darwin
            goarch: arm64
            output: aqry-darwin-arm64
          - goos: windows
            goarch: amd64
            output: aqry-windows-amd64.exe
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.23.x"
          cache: true
      - name: Build ${{ matrix.goos }}
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: go build -o ${{ matrix.output }} ./cmd/aqry

  windows-installer:
    runs-on: windows-latest
    defaults:
      run:
        shell: pwsh
    steps:
      - uses: actions/checkout@v4
      - name: Test bundled-binary Windows installer
        env:
          AQRY_ARTIFACT_DIR: ${{ github.workspace }}\dist
          AQRY_INSTALL_DIR: ${{ runner.temp }}\aqry-bin
        run: |
          & ./scripts/install.ps1
          & ./scripts/install.ps1
          $expected = [IO.Path]::GetFullPath("$env:AQRY_INSTALL_DIR\aqry.exe")
          $actual = (Get-Command aqry -ErrorAction Stop).Source
          if (-not [string]::Equals($actual, $expected, [StringComparison]::OrdinalIgnoreCase)) {
            throw "aqry resolved to $actual instead of $expected"
          }
          & aqry --version
